<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>RAG MVP</h1>
    <p>문서 업로드 화면</p>
    {% if has_api_key %}
    <p>OpenAI API 키 상태: 설정됨</p>
    {% else %}
    <p>OpenAI API 키 상태: 없음 (.env 확인 필요)</p>
    {% endif %}

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".txt" required />
        <button type="submit">업로드</button>
    </form>

    <p><a href="/index">문서 인덱싱 페이지로 이동</a></p>

    <h2>업로드된 파일</h2>
    <ul>
        {% for name in files %}
        <li>{{ name }}</li>
        {% else %}
        <li>(없음)</li>
        {% endfor %}
    </ul>
</body>
</html>
